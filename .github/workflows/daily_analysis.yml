name: 每日股票分析

on:
  # 定时触发 - 每天台北時間 14:30 (UTC 06:30)
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'stocks-only'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))
        
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 创建必要目录
        run: |
          mkdir -p data logs reports
          
      - name: 执行股票分析
        env:
          TZ: Asia/Taipei
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_MODEL_FALLBACK: ${{ vars.GEMINI_MODEL_FALLBACK || secrets.GEMINI_MODEL_FALLBACK || 'gemini-1.5-flash' }}
          GEMINI_REQUEST_DELAY: '3.0'
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '2330.TW,0050.TW' }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'tw' }}
          MARKET_REVIEW_ENABLED: 'false'
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'simple' }}
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
          ENABLE_CHIP_DISTRIBUTION: 'false'
          REALTIME_SOURCE_PRIORITY: 'yfinance'
          ANALYSIS_DELAY: '15'
          
        run: |
          MODE="${{ github.event.inputs.mode || 'stocks-only' }}"
          
          echo "=========================================="
          echo "🚀 台股自选股智能分析系统"
          echo "=========================================="
          echo "⏰ 時間: $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: $MODE"
          echo "📊 自选股: $STOCK_LIST"
          echo "=========================================="
          
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi
          
          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
          
      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
